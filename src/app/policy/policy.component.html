<div align="center">
    <h1 *ngIf="!form.data.id" align="center" style="margin-bottom: 5px; color: navy">Add Policy</h1>
    <h1 *ngIf="form.data.id>0" align="center" style="margin-bottom: 5px; color: navy">Update Policy</h1>

    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{ form.message }}</h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{ form.message }}</h3>
    </div>

    <table>
        <tr>
            <th align="left">Policy Name<span style="color: red">*</span></th>
            <td><input type="text" name="policyName" [(ngModel)]="form.data.policyName" placeholder="Enter Policy Name">
            </td>
            <td style="position: fixed; color: red;">{{form.inputerror.policyName}}</td>
        </tr>

        <tr>
            <th align="left">Premium Amount<span style="color: red">*</span></th>
            <td><input type="text" name="visitorName" [(ngModel)]="form.data.premiumAmount"
                    placeholder="Enter Premium Amount "></td>
            <td style="position: fixed; color: red;">{{form.inputerror.premiumAmount}}</td>
        </tr>



        <tr>
            <th align="left">Start Date<span style="color: red">*</span></th>
            <td><input type="date" name="startDate"  [(ngModel)]="form.data.startDate" [ngModel]="form.data.startDate | date:'yyyy-MM-dd'"  
                    placeholder="Enter Start Date" style="width: 97%;"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.startDate}}</td>
        </tr>





        <tr></tr>

        <tr>
            <th></th>
            <td align="left" colspan="2">
                <button (click)="submit()">save</button> &nbsp;
                <button (click)="reset()">Reset</button>
            </td>
        </tr>
    </table>
</div>

<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;

            /* ORS Professional Background */
            background-image: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dark overlay for readability */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        h1 {
            position: relative;
            color: white;
            font-size: 50px;
            text-align: center;

            background: rgba(255, 255, 255, 0.15);
            padding: 20px 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

    <h1>
        Welcome to ORSProject-10
    </h1>

</body>

</html>

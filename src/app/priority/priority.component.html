<div align="center">
    <h1 *ngIf="!form.data.id" align="center" style="margin-bottom: 5px; color: navy">Add Priority</h1>
    <h1 *ngIf="form.data.id>0" align="center" style="margin-bottom: 5px; color: navy">Update Priority</h1>

    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{ form.message }}</h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{ form.message }}</h3>
    </div>

    <table>
        <tr>
            <th align="left"> Priority Code<span style="color: red">*</span></th>
            <td><input type="text" name="prioritycode" [(ngModel)]="form.data.prioritycode" placeholder="Enter  priority code"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.prioritycode}}</td>
        </tr>

        <tr>
            <th align="left">Priority Level<span style="color: red">*</span></th>
            <td><input type="text" name="prioritylevel" [(ngModel)]="form.data.prioritylevel" placeholder="Enter priority level"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.prioritylevel}}</td>
        </tr>

        <tr>
            <th align="left">Color Tag<span style="color: red">*</span></th>
            <td><input type="text" name="colortag" [(ngModel)]="form.data.colortag" placeholder="Enter color tag"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.colortag}}</td>
        </tr>

        <tr>
            <th align="left">Priority Status<span style="color: red">*</span></th>
            <td><input type="text" name="prioritystatus" [(ngModel)]="form.data.prioritystatus" placeholder="Enter priority status "></td>
            <td style="position: fixed; color: red;">{{form.inputerror.prioritystatus}}</td>
        </tr>

       

       

       

       

      

       

        <tr></tr>

        <tr>
            <th></th>
            <td align="left" colspan="2">
                <button (click)="submit()">save</button> &nbsp;
               <button (click)="reset()">Reset</button>
            </td>
        </tr>
    </table>
</div>

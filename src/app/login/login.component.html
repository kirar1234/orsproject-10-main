<div class="login-bg">
    <br><br><br><br><br>

    <div class="container pt-4">

        <div class="row">

            <div class="col-md-3"></div>

            <div class="col-md-6">

                <div class="card">

                    <div class="card-body">

                        <h3 class="text-center text-primary pb-3">Login</h3>

                        <!-- SUCCESS MESSAGE -->
                        <div *ngIf="!form.error && form.message" class="alert alert-success alert-dismissible">
                            <button type="button" class="close" data-dismiss="alert">&times;</button>
                            {{form.message}}
                        </div>

                        <!-- ERROR MESSAGE -->
                        <div *ngIf="form.error && form.message" class="alert alert-danger alert-dismissible">
                            <button type="button" class="close" data-dismiss="alert">&times;</button>
                            {{form.message}}
                        </div>

                        <!-- FORM START -->
                        <form>

                            <!-- LOGIN ID -->
                            <label><b>Login Id</b> <span style="color:red">*</span></label>

                            <div class="input-group mb-2">

                                <div class="input-group-prepend">
                                    <div class="input-group-text">
                                        <i class="fa fa-envelope"></i>
                                    </div>
                                </div>

                                <input type="text" class="form-control" name="loginId" [(ngModel)]="form.data.loginId"
                                    placeholder="Enter Login ID">

                            </div>

                            <div><span class="text-danger">{{form.inputerror.loginId}}</span></div>

                            <!-- PASSWORD -->
                            <label class="mt-2"><b>Password</b> <span style="color:red">*</span></label>

                            <div class="input-group mb-2">

                                <div class="input-group-prepend">
                                    <div class="input-group-text">
                                        <i class="fa fa-key"></i>
                                    </div>
                                </div>

                                <input type="password" class="form-control" name="password"
                                    [(ngModel)]="form.data.password" placeholder="Enter Password">

                            </div>

                            <div><span class="text-danger">{{form.inputerror.password}}</span></div>

                            <!-- BUTTONS -->
                            <div class="text-center mt-3">



                                <button type="button" class="btn btn-success" (click)="signIn()">
                                    Sign In
                                </button>

                                &nbsp;



                                <button type="button" class="btn btn-primary" (click)="signUp()">
                                    Sign Up
                                </button>

                            </div>

                            <div class="text-center mt-3">
                                <a [routerLink]="['/forgotpassword']"><b>Forgot password?</b></a>
                            </div>



                        </form>
                        <!-- FORM END -->

                    </div>

                </div>

            </div>


            <div class="col-md-3"></div>

        </div>

    </div>
</div>

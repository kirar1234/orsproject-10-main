<div class="container" style="margin-top:120px">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-body">

                    <h3 class="text-center text-primary">Forget Your Password?</h3>

                    <p class="text-center text-info" style="font-size:12px">
                        Submit your Email Address and we will send you password
                    </p>

                    <!-- Success Message -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success">
                        {{form.message}}
                    </div>

                    <!-- Error Message -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger">
                        {{form.message}}
                    </div>

                    <div class="form-group">

                        <label><b>Email Id</b><span style="color:red">*</span></label>

                        <div class="input-group">

                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-envelope"></i>
                                </span>
                            </div>

                            <input type="text" class="form-control" name="loginId" [(ngModel)]="form.data.loginId"
                                placeholder="Enter Email">

                        </div>

                        <!-- Validation Error -->
                        <small style="color:red">
                            {{form.inputerror.loginId}}
                        </small>

                    </div>

                    <div class="text-center mt-3">
                        <button class="btn btn-success" (click)="submit()">
                            Go
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>

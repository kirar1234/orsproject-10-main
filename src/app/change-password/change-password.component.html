<div class="container pt-5" style="margin-top:100px; margin-bottom:100px;">

    <div class="row">

        <div class="col-md-3"></div>

        <div class="col-md-6">

            <div class="card">

                <div class="card-body">

                    <h3 class="text-center text-primary pb-3">Change Password</h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success">
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger">
                        {{form.message}}
                    </div>

                    <form>

                        <!-- OLD PASSWORD -->
                        <label><b>Old Password</b> <span style="color:red">*</span></label>

                        <div class="input-group mb-2">

                            <div class="input-group-prepend">
                                <div class="input-group-text">
                                    <i class="fa fa-key"></i>
                                </div>
                            </div>

                            <input type="password" class="form-control" name="oldPassword"
                                [(ngModel)]="form.data.oldPassword" placeholder="Enter Old Password">

                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.oldPassword}}</span>
                        </div>


                        <!-- NEW PASSWORD -->
                        <label class="mt-2"><b>New Password</b> <span style="color:red">*</span></label>

                        <div class="input-group mb-2">

                            <div class="input-group-prepend">
                                <div class="input-group-text">
                                    <i class="fa fa-lock"></i>
                                </div>
                            </div>

                            <input type="password" class="form-control" name="newPassword"
                                [(ngModel)]="form.data.newPassword" placeholder="Enter New Password">

                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.newPassword}}</span>
                        </div>


                        <!-- CONFIRM PASSWORD -->
                        <label class="mt-2"><b>Confirm Password</b> <span style="color:red">*</span></label>

                        <div class="input-group mb-2">

                            <div class="input-group-prepend">
                                <div class="input-group-text">
                                    <i class="fa fa-lock"></i>
                                </div>
                            </div>

                            <input type="password" class="form-control" name="confirmPassword"
                                [(ngModel)]="form.data.confirmPassword" placeholder="Confirm Password">

                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.confirmPassword}}</span>
                        </div>


                        <!-- BUTTONS -->
                        <div class="text-center mt-3">

                            <button type="button" class="btn btn-success" (click)="changePassword()">
                                Change Password
                            </button>

                            &nbsp;

                            

                        </div>

                    </form>

                </div>

            </div>

        </div>

        <div class="col-md-3"></div>
       

    </div>

</div>

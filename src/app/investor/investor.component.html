<div align="center">
    <h1 *ngIf="!form.data.id" align="center" style="margin-bottom: 5px; color: navy">Add Investor</h1>
    <h1 *ngIf="form.data.id>0" align="center" style="margin-bottom: 5px; color: navy">Update Investor</h1>

    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{ form.message }}</h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{ form.message }}</h3>
    </div>

    <table>
        <tr>
            <th align="left">Investor Name<span style="color: red">*</span></th>
            <td><input type="text" name="investorName" [(ngModel)]="form.data.investorName" placeholder="Enter Investor Name"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.investorName}}</td>
        </tr>

        <tr>
            <th align="left">Investment Amount<span style="color: red">*</span></th>
            <td><input type="text" name="investmentAmount" [(ngModel)]="form.data.investmentAmount" placeholder="Enter Investment Amount "></td>
            <td style="position: fixed; color: red;">{{form.inputerror.investmentAmount}}</td>
        </tr>


          <tr>
            <th align="left">Investment Type<span style="color: red">*</span></th>
            <td><input type="text" name="investmentType" [(ngModel)]="form.data.investmentType" placeholder="Enter Investment Type "></td>
            <td style="position: fixed; color: red;">{{form.inputerror.investmentType}}</td>
        </tr>

        

       

        <tr></tr>

        <tr>
            <th></th>
            
            <td align="left" colspan="2">
                <button (click)="submit()">save</button> &nbsp;
               <button (click)="reset()">Reset</button>
            </td>
        </tr>
    </table>
</div>

<div align="center">
    <h1 *ngIf="!form.data.id" align="center" style="margin-bottom: 5px; color: navy">Add Accesslog</h1>
    <h1 *ngIf="form.data.id>0" align="center" style="margin-bottom: 5px; color: navy">Update Accesslog</h1>

    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{ form.message }}</h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{ form.message }}</h3>
    </div>

    <table>
        <tr>
            <th align="left">Reference Id<span style="color: red">*</span></th>
            <td><input type="text" name="accessReferenceId" [(ngModel)]="form.data.accessReferenceId" placeholder="Enter Reference Id"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.accessReferenceId}}</td>
        </tr>

        <tr>
            <th align="left">Access Type<span style="color: red">*</span></th>
            <td><input type="text" name="accessType" [(ngModel)]="form.data.accessType" placeholder="Enter Accesstype"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.accessType}}</td>
        </tr>

       

      

        <tr>
            <th align="left">Access Time<span style="color: red">*</span></th>
            <td><input type="datetime-local"  step="1" name="accessTime" [(ngModel)]="form.data.accessTime" [ngModel]="form.data.accessTime" placeholder="Select Access Time" style="width: 97%;"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.accessTime}}</td>
        </tr>

         <tr>
            <th align="left">Access Status<span style="color: red">*</span></th>
            <td><input type="accessStatus" name="accessStatus" [(ngModel)]="form.data.accessStatus" placeholder="Enter Access Status"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.accessStatus}}</td>
        </tr>

       

        

       

        

       

        <tr></tr>

        <tr>
            <th></th>
            <td align="left" colspan="2">
                <button (click)="submit()">save</button> &nbsp;
               <button (click)="reset()">Reset</button>
            </td>
        </tr>
    </table>
</div>

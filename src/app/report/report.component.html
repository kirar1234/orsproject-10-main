<div align="center">
    <h1 *ngIf="!form.data.id" align="center" style="margin-bottom: 5px; color: navy">Add Report</h1>
    <h1 *ngIf="form.data.id>0" align="center" style="margin-bottom: 5px; color: navy">Update Report</h1>

    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{ form.message }}</h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{ form.message }}</h3>
    </div>

    <table>
        <tr>
            <th align="left">Report Id<span style="color: red">*</span></th>
            <td><input type="text" name="reportId" [(ngModel)]="form.data.reportId" placeholder="Enter reportId"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.reportId}}</td>
        </tr>

        <tr>
            <th align="left">Report Name<span style="color: red">*</span></th>
            <td><input type="text" name="reportName" [(ngModel)]="form.data.reportName" placeholder="Enter Report Name"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.reportName}}</td>
        </tr>

       

        <tr>
            <th align="left">Generated By<span style="color: red">*</span></th>
            <td><input type="generatedBy" name="generatedBy" [(ngModel)]="form.data.generatedBy" placeholder="Enter Generated by"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.generatedBy}}</td>
        </tr>

        <tr>
            <th align="left"> Generated Date<span style="color: red">*</span></th>
            <td><input type="date" name="generatedDate" [(ngModel)]="form.data.generatedDate" [ngModel]="form.data.generatedDate | date:'yyyy-MM-dd'" placeholder="Select Generated Date" style="width: 97%;"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.generatedDate}}</td>
        </tr>

       
       

        <tr>
            <th align="left">Report Status<span style="color: red">*</span></th>
            <td><input type="text" name="reportStatus" [(ngModel)]="form.data.reportStatus" maxlength="10" placeholder="Enter report status"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.reportStatus}}</td>
        </tr>

        

       
        <tr></tr>

        <tr>
            <th></th>
            <td align="left" colspan="2">
                <button (click)="submit()">save</button> &nbsp;
               <button (click)="reset()">Reset</button>
            </td>
        </tr>
    </table>
</div>

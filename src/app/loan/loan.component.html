<div align="center">
    <h1 *ngIf="!form.data.id" align="center" style="margin-bottom: 5px; color: navy">Add Loan</h1>
    <h1 *ngIf="form.data.id>0" align="center" style="margin-bottom: 5px; color: navy">Update Loan</h1>

    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{ form.message }}</h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{ form.message }}</h3>
    </div>

    <table>
        <tr>
            <th align="left">Loan Name<span style="color: red">*</span></th>
            <td><input type="text" name="loanName" [(ngModel)]="form.data.loanName" placeholder="Enter Loan Name"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.loanName}}</td>
        </tr>

        <tr>
            <th align="left">Laon Amount<span style="color: red">*</span></th>
            <td><input type="text" name="loanAmount" [(ngModel)]="form.data.loanAmount" placeholder="Enter Loan Amount "></td>
            <td style="position: fixed; color: red;">{{form.inputerror.loanAmount}}</td>
        </tr>


          <tr>
            <th align="left"> Interest Rate<span style="color: red">*</span></th>
            <td><input type="text" name="interestRate" [(ngModel)]="form.data.interestRate" placeholder="Enter Purpose "></td>
            <td style="position: fixed; color: red;">{{form.inputerror.interestRate}}</td>
        </tr>

         <tr>
            <th align="left">Issue Date<span style="color: red">*</span></th>
            <td><input type="date"   name="issueDate" [(ngModel)]="form.data.issueDate " [ngModel]="form.data.issueDate  | date:'yyyy-MM-dd'" placeholder="Enter  Issue Date" style="width: 97%;"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.issueDate}}</td>
        </tr>

        

       

        <tr></tr>

        <tr>
            <th></th>
            <td align="left" colspan="2">
                <button (click)="submit()">save</button> &nbsp;
               <button (click)="reset()">Reset</button>
            </td>
        </tr>
    </table>
</div>
